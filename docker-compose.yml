version: "3.8"
services:
  chromaffmpeg:
    build: .
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - /data/outputs:/data/outputs
      - /data/folders:/data/folders
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
